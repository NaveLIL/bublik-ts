services:
  # ── PostgreSQL ───────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bublik-n-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bublik}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-bublik}
    volumes:
      - pg_data:/var/lib/postgresql/data
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bublik"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bublik-n-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    # ports:
    #   - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Bublik Bot ───────────────────────────────
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bublik-n-bot
    image: bublik-n-bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bublik}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bublik}?schema=public
      REDIS_URL: redis://redis:6379
    volumes:
      - ./logs:/app/logs
      - ./locales:/app/locales:ro

volumes:
  pg_data:
  redis_data:
